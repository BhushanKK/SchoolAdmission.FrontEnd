<style>
    .text-dark {
        --mdb-text-opacity: 1;
        color: white !important;
    }
</style>
<div class="card p-4 shadow">

    <h4 class="mb-4 text-center">Student Admission Wizard</h4>

    <!-- Progress Bar -->
    <div class="progress mb-4" style="height: 10px; border-radius: 5px;">
        <div id="progressBar" class="progress-bar bg-primary" style="width: 16.66%;"></div>
    </div>

    <!-- STEP 1: STUDENT INFO -->
    <div class="step">

        <h6>Student Information</h6>

        <div class="row">

            <div class="col-md-4 mb-3">
                <input type="text" id="firstName" autocomplete="off" class="form-control" placeholder="First Name">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="middleName" autocomplete="off" class="form-control" placeholder="Middle Name">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="lastName" autocomplete="off" class="form-control" placeholder="Last Name">
            </div>

            <div class="col-md-4 mb-3">
                <select id="gender" class="form-select">
                    <option value="true">Male</option>
                    <option value="false">Female</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <input type="date" id="dob" autocomplete="off" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <input type="number" min="1" minlength="12" id="aadharNo" autocomplete="off" class="form-control"
                    placeholder="Aadhar No">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="saralId" autocomplete="off" class="form-control" placeholder="Saral ID">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="nationality" value="Indian" disabled autocomplete="off" class="form-control"
                    placeholder="Nationality">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="motherTongue" autocomplete="off" class="form-control"
                    placeholder="Mother Tongue">
            </div>

            <div class="col-md-4 mb-3">
                <select id="religionId" class="form-control form-select" data-mdb-select-init>
                    <option value="">Select Religion</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <select id="categoryId" class="form-control form-select" data-mdb-select-init>
                    <option value="">Select Category</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <select id="casteId" class="form-control form-select" data-mdb-select-init disabled>
                    <option value="">Select Caste</option>
                </select>
            </div>

            <div class="col-md-2">
                <input type="checkbox" id="isMinority" disabled> Minority
            </div>

            <!-- <div class="col-md-2">
                <input type="checkbox" id="isBpl"> BPL
            </div> -->

        </div>

        <button class="btn btn-primary mt-3" onclick="nextStep()">Next</button>

    </div>

    <!-- STEP 2: Address -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-success fs-6 py-2 px-3">Step 2: Address Details</span>
        </div>

        <div class="row g-4">
            <!-- Permanent Address -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 border-0">
                    <h6 class="text-primary mb-3">Permanent Address</h6>

                    <input type="text" autocomplete="off" id="permanent_village" class="form-control mb-2"
                        placeholder="Village">
                    <input type="text" autocomplete="off" id="permanent_city" class="form-control mb-2"
                        placeholder="City">
                    <input type="text" autocomplete="off" id="permanent_district" class="form-control mb-2"
                        placeholder="District">
                    <input type="text" autocomplete="off" id="permanent_state" class="form-control mb-2"
                        placeholder="State">
                    <input type="number" min="1" length="6" autocomplete="off" id="permanent_pincode"
                        class="form-control mb-2" placeholder="Pincode">
                </div>
            </div>

            <!-- Current Address -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 border-0">

                    <!-- Header with Toggle -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="text-success mb-0">Current Address</h6>

                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="sameAddress" onclick="copyPermanent()">
                            <label class="form-check-label small">Same as Permanent</label>
                        </div>
                    </div>

                    <input type="text" autocomplete="off" id="current_village" class="form-control mb-2"
                        placeholder="Village">
                    <input type="text" autocomplete="off" id="current_city" class="form-control mb-2"
                        placeholder="City">
                    <input type="text" autocomplete="off" id="current_district" class="form-control mb-2"
                        placeholder="District">
                    <input type="text" autocomplete="off" id="current_state" class="form-control mb-2"
                        placeholder="State">
                    <input type="number" length="6" min="1" id="current_pincode" class="form-control mb-2"
                        placeholder="Pincode">
                </div>
            </div>
        </div>

        <div class="mt-4 d-flex justify-content-between">
            <button class="btn btn-outline-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary px-4" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 3: Physical Details -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-warning text-dark fs-6 py-2 px-3">Step 3: Physical Details</span>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><input type="text" id="height" class="form-control" placeholder="Height (cm)"></div>
            <div class="col-md-4"><input type="text" id="weight" class="form-control" placeholder="Weight (kg)"></div>
            <div class="col-md-4"><input type="text" id="handicappedTypeId" class="form-control"
                    placeholder="Handicapped Type ID"></div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 4: Parent Info -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-info text-dark fs-6 py-2 px-3">Step 4: Parent / Guardian Info</span>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><input type="text" id="fatherName" class="form-control" placeholder="Father Name">
            </div>
            <div class="col-md-4"><input type="text" id="motherName" class="form-control" placeholder="Mother Name">
            </div>
            <div class="col-md-4"><input type="text" id="grandFatherName" class="form-control"
                    placeholder="Grand Father Name"></div>
            <div class="col-md-4"><input type="text" id="parentName" class="form-control"
                    placeholder="Parent/Guardian Name"></div>
            <div class="col-md-4"><input type="text" id="contactNo" class="form-control" placeholder="Contact No"></div>
            <div class="col-md-4"><input type="email" id="emailId" class="form-control" placeholder="Email ID"></div>
            <div class="col-md-4"><input type="text" id="income" class="form-control" placeholder="Income"></div>
            <div class="col-md-4"><input type="text" id="occupation" class="form-control" placeholder="Occupation">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 5: Previous School Info -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-secondary fs-6 py-2 px-3">Step 5: Previous School Info</span>
        </div>
        <div class="row g-3">
            <div class="col-md-6"><input type="text" id="previousSchool" class="form-control"
                    placeholder="Previous School"></div>
            <div class="col-md-6"><input type="date" id="schoolDOE" class="form-control"
                    placeholder="Date of Enrollment"></div>
            <div class="col-md-4"><input type="text" id="progress" class="form-control" placeholder="Progress"></div>
            <div class="col-md-4"><input type="text" id="behaviour" class="form-control" placeholder="Behaviour"></div>
            <div class="col-md-4"><input type="text" id="passingYear" class="form-control" placeholder="Passing Year">
            </div>
            <div class="col-md-4"><input type="text" id="seatNo" class="form-control" placeholder="Seat No"></div>
            <div class="col-md-4"><input type="text" id="totalMarks" class="form-control" placeholder="Total Marks">
            </div>
            <div class="col-md-4"><input type="text" id="percentage" class="form-control" placeholder="Percentage">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 6: Student Document Upload -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-dark fs-6 py-2 px-3">Step 6: Upload Documents</span>
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card p-3 border-info mb-3">
                    <h6 class="text-info">Document Info</h6>
                    <input type="text" id="documentType" class="form-control mb-2" placeholder="Document Type">
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 border-info mb-3">
                    <h6 class="text-info">Upload File</h6>
                    <input type="file" id="documentFile" class="form-control">
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-success" onclick="submitForm()">Submit</button>
        </div>
    </div>

</div>
