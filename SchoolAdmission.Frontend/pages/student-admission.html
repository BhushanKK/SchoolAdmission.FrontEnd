<style>
    .text-dark {
        --mdb-text-opacity: 1;
        color: white !important;
    }
</style>
<div class="card p-4 shadow">

    <h4 class="mb-4 text-center">Student Admission Wizard</h4>

    <!-- Progress Bar -->
    <div class="progress mb-4" style="height: 10px; border-radius: 5px;">
        <div id="progressBar" class="progress-bar bg-primary" style="width: 16.66%;"></div>
    </div>

    <!-- STEP 1: STUDENT INFO -->
    <div class="step">

        <div class="mb-3">
            <span class="badge bg-success text-dark fs-6 py-2 px-3">Step 1: Student Info</span>
        </div>

        <div class="row">

            <div class="col-md-4 mb-3">
                <input type="text" id="firstName" class="form-control" placeholder="First Name">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="middleName" class="form-control" placeholder="Middle Name">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="lastName" class="form-control" placeholder="Last Name">
            </div>

            <div class="col-md-4 mb-3">
                <select id="gender" class="form-select">
                    <option value="true">Male</option>
                    <option value="false">Female</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <input type="date" id="dob" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="aadharNo" class="form-control" placeholder="Aadhar No">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="saralId" class="form-control" placeholder="Saral ID">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="nationality" class="form-control" placeholder="Nationality">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="motherTongue" class="form-control" placeholder="Mother Tongue">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="religionId" class="form-control" placeholder="Religion">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="casteId" class="form-control" placeholder="Caste">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" id="categoryId" class="form-control" placeholder="Category">
            </div>

            <div class="col-md-3">
                <input type="checkbox" id="isMinority"> Minority
            </div>

            <div class="col-md-3">
                <input type="checkbox" id="isHandicapped"> Handicapped
            </div>

            <div class="col-md-3">
                <input type="checkbox" id="isBpl"> BPL
            </div>

            <div class="col-md-3">
                <input type="text" id="bpL_Type" class="form-control" placeholder="BPL Type">
            </div>

        </div>
        <button class="btn btn-success mt-3" id="btnSaveStudentInfo">Save Student Info</button>
        <button class="btn btn-primary mt-3" onclick="nextStep()">Next</button>

    </div>

    <!-- STEP 2: Address -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-success fs-6 py-2 px-3">Step 2: Address Details</span>
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card p-3 mb-3 border-primary">
                    <h6 class="text-primary">Permanent Address</h6>
                    <input type="text" id="permanent_village" class="form-control mb-2" placeholder="Village">
                    <input type="text" id="permanent_city" class="form-control mb-2" placeholder="City">
                    <input type="text" id="permanent_district" class="form-control mb-2" placeholder="District">
                    <input type="text" id="permanent_state" class="form-control mb-2" placeholder="State">
                    <input type="text" id="permanent_pincode" class="form-control mb-2" placeholder="Pincode">
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 mb-3 border-success">
                    <h6 class="text-success">Current Address</h6>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="sameAddress" onclick="copyPermanent()">
                        <label class="form-check-label">Same as Permanent</label>
                    </div>
                    <input type="text" id="current_village" class="form-control mb-2" placeholder="Village">
                    <input type="text" id="current_city" class="form-control mb-2" placeholder="City">
                    <input type="text" id="current_district" class="form-control mb-2" placeholder="District">
                    <input type="text" id="current_state" class="form-control mb-2" placeholder="State">
                    <input type="text" id="current_pincode" class="form-control mb-2" placeholder="Pincode">
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 3: Physical Details -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-warning text-dark fs-6 py-2 px-3">Step 3: Physical Details</span>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><input type="text" id="height" class="form-control" placeholder="Height (cm)"></div>
            <div class="col-md-4"><input type="text" id="weight" class="form-control" placeholder="Weight (kg)"></div>
            <div class="col-md-4"><input type="text" id="handicappedTypeId" class="form-control"
                    placeholder="Handicapped Type ID"></div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 4: Parent Info -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-info text-dark fs-6 py-2 px-3">Step 4: Parent / Guardian Info</span>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><input type="text" id="fatherName" class="form-control" placeholder="Father Name">
            </div>
            <div class="col-md-4"><input type="text" id="motherName" class="form-control" placeholder="Mother Name">
            </div>
            <div class="col-md-4"><input type="text" id="grandFatherName" class="form-control"
                    placeholder="Grand Father Name"></div>
            <div class="col-md-4"><input type="text" id="parentName" class="form-control"
                    placeholder="Parent/Guardian Name"></div>
            <div class="col-md-4"><input type="text" id="contactNo" class="form-control" placeholder="Contact No"></div>
            <div class="col-md-4"><input type="email" id="emailId" class="form-control" placeholder="Email ID"></div>
            <div class="col-md-4"><input type="text" id="income" class="form-control" placeholder="Income"></div>
            <div class="col-md-4"><input type="text" id="occupation" class="form-control" placeholder="Occupation">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 5: Previous School Info -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-secondary fs-6 py-2 px-3">Step 5: Previous School Info</span>
        </div>
        <div class="row g-3">
            <div class="col-md-6"><input type="text" id="previousSchool" class="form-control"
                    placeholder="Previous School"></div>
            <div class="col-md-6"><input type="date" id="schoolDOE" class="form-control"
                    placeholder="Date of Enrollment"></div>
            <div class="col-md-4"><input type="text" id="progress" class="form-control" placeholder="Progress"></div>
            <div class="col-md-4"><input type="text" id="behaviour" class="form-control" placeholder="Behaviour"></div>
            <div class="col-md-4"><input type="text" id="passingYear" class="form-control" placeholder="Passing Year">
            </div>
            <div class="col-md-4"><input type="text" id="seatNo" class="form-control" placeholder="Seat No"></div>
            <div class="col-md-4"><input type="text" id="totalMarks" class="form-control" placeholder="Total Marks">
            </div>
            <div class="col-md-4"><input type="text" id="percentage" class="form-control" placeholder="Percentage">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
    </div>

    <!-- STEP 6: Student Document Upload -->
    <div class="step">
        <div class="mb-3">
            <span class="badge bg-dark fs-6 py-2 px-3">Step 6: Upload Documents</span>
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card p-3 border-info mb-3">
                    <h6 class="text-info">Document Info</h6>
                    <input type="text" id="documentType" class="form-control mb-2" placeholder="Document Type">
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 border-info mb-3">
                    <h6 class="text-info">Upload File</h6>
                    <input type="file" id="documentFile" class="form-control">
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            <button class="btn btn-success" onclick="submitForm()">Submit</button>
        </div>
    </div>

</div>
