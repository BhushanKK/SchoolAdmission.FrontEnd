<div class="card shadow-sm">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Standard Master List</h5>
            <button class="btn btn-primary btn-sm" id="addStandardBtn">
                + Add Standard
            </button>
        </div>

        <div class="table-responsive">
            <table id="standardTable" class="table table-striped table-bordered align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th style="width:120px">Standard Id</th>
                        <th>Standard Name</th>
                        <th style="width:160px">Actions</th>
                    </tr>
                </thead>
            </table>
        </div>

    </div>
</div>

<div class="modal fade" id="standardModal" tabindex="-1">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-primary text-white">
                <h6 class="modal-title mb-0">Add / Edit Standard</h6>
                <button type="button" class="btn-close btn-close-white" data-mdb-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="standardId">

                <div class="mb-3">
                    <label class="form-label">Standard Name</label>
                    <input type="text" class="form-control" id="standardName" placeholder="Enter Standard name">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-light" data-mdb-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveStandardBtn">Save</button>
            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h6 class="modal-title">Confirm Delete</h6>
                <button type="button"
                        class="btn-close btn-close-white"
                        data-mdb-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <p class="mb-0">Are you sure you want to delete this record?</p>
            </div>

            <div class="modal-footer justify-content-center">
                <button class="btn btn-light btn-sm"
                        data-mdb-dismiss="modal">Cancel</button>

                <button class="btn btn-danger btn-sm"
                        id="confirmDeleteBtn">Delete</button>
            </div>

        </div>
    </div>
</div>
