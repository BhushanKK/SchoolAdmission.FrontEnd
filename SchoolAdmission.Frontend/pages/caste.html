<div class="card shadow-sm">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Caste Master List</h5>
            <button class="btn btn-primary btn-sm" id="addCasteBtn">
                + Add Caste
            </button>
        </div>

        <div class="table-responsive">
            <table id="casteTable" class="table table-striped table-bordered align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th style="width:120px">Caste Id</th>
                        <th>Category</th>
                        <th>Caste</th>
                        <th style="width:160px">Actions</th>
                    </tr>
                </thead>
            </table>
        </div>

    </div>

</div>


<!-- ⭐ Add / Edit Modal -->
<div class="modal fade" id="casteModal" tabindex="-1">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-primary text-white">
                <h6 class="modal-title mb-0">Add / Edit Caste</h6>
                <button type="button" class="btn-close btn-close-white" data-mdb-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="casteId">

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="categoryId"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Caste Name</label>
                    <input type="text" class="form-control" id="casteName" placeholder="Enter caste name">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-light" data-mdb-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveCasteBtn">Save</button>
            </div>

        </div>
    </div>
</div>
<!-- ⭐ Delete Confirmation Modal -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h6 class="modal-title">Confirm Delete</h6>
                <button type="button"
                        class="btn-close btn-close-white"
                        data-mdb-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <p class="mb-0">Are you sure you want to delete this record?</p>
            </div>

            <div class="modal-footer justify-content-center">
                <button class="btn btn-light btn-sm"
                        data-mdb-dismiss="modal">Cancel</button>

                <button class="btn btn-danger btn-sm"
                        id="confirmDeleteBtn">Delete</button>
            </div>

        </div>
    </div>
</div>


<!-- ⭐ Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="casteToast" class="toast text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-mdb-dismiss="toast"></button>
        </div>
    </div>
</div>
