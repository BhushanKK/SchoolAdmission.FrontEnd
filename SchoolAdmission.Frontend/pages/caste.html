<div class="card shadow-sm">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Caste Details</h5>
            <button class="btn btn-primary btn-sm" id="addCasteBtn">
                + Add Caste
            </button>
        </div>

        <div class="table-responsive">
            <table id="casteTable" class="table table-striped table-bordered align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th style="width:120px">Caste Id</th>
                        <th>Category</th>
                        <th>Caste</th>
                        <th style="width:160px">Actions</th>
                    </tr>
                </thead>
            </table>
        </div>

    </div>

</div>

<div class="modal fade" id="casteModal" tabindex="-1">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-primary text-white">
                <h6 class="modal-title mb-0">Add / Edit Caste</h6>
                <button type="button" class="btn-close btn-close-white" data-mdb-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="casteId">

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="categoryId"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Caste Name</label>
                    <input type="text" class="form-control nameValidation" id="casteName" placeholder="Enter caste name">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-light" data-mdb-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveCasteBtn">Save</button>
            </div>

        </div>
    </div>
</div>
