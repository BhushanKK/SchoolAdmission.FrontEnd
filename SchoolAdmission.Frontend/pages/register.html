<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Admission Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- MDB CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.css" rel="stylesheet"/>

    <style>
        body {
            background: linear-gradient(135deg,#1cc88a,#13855c);
        }

        .card {
            border-radius: 15px;
        }

        .form-control, .form-select {
            border: 1px solid #ccc !important;
            border-radius: 6px;
            background-color: #fff;
        }

        .form-control:focus, .form-select:focus {
            border-color: #1cc88a !important;
            box-shadow: none !important;
        }

        .form-label {
            font-weight: 500;
        }

        /* Register button design */
        .btn-success {
            background: linear-gradient(135deg, #1cc88a, #13855c);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #17a673, #0f6848);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 text-success">Student Registration</h3>

                    <form id="registerForm">

                        <!-- ROW 1: Committee & School -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Committee</label>
                                <select id="committee" class="form-select form-control" required>
                                    <option value="">Select Committee</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">School</label>
                                <select id="school" class="form-select form-control" required disabled>
                                    <option value="">Select School</option>
                                </select>
                            </div>
                        </div>

                        <!-- ROW 2: First & Last Name -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="nameValidation form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Middle Name</label>
                                <input type="text" id="middleName" class="nameValidation form-control">
                            </div>
                            
                        </div>

                        <!-- ROW 3: Middle & Mobile -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="lastName" class="nameValidation form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="text" id="mobileNo" minlength="10" maxlength="10" class="numberValidation form-control" required>
                            </div>
                        </div>

                        <!-- ROW 4: Email & Password -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="emailId" class="form-control emailValidation " required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control passwordValidation" required>
                            </div>
                        </div>

                        <!-- ROW 5: Confirm Password -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control confirmPasswordValidation" required>
                            </div>
                        </div>

                        <!-- BUTTON -->
                        <div class="row">
                            <div class="col-12">
                                <button type="submit" class="btn btn-success w-100 btn-lg mt-3">
                                    Register
                                </button>
                            </div>
                        </div>

                        <!-- Messages -->
                        <div class="text-danger mt-3 text-center" id="errorMsg"></div>
                        <div class="text-success mt-3 text-center" id="successMsg"></div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer bg-light text-center text-muted py-3">
    &copy; <span id="currentYear"></span> Shriyash Computers and IT Solutions Pvt.Ltd.
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/studentRegistration.js"></script>
<script src="../js/validations.js"></script>


</body>
</html>
